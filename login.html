<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aegis | Secure Portal Login</title>
  <meta name="description" content="Secure portal login for clients of Aegis. Manage transaction parameters, due diligence rooms, and reports.">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#0a2216',
              midnight: '#123824',
              royal: '#059669',
              slate: '#64748B',
              teal: '#10B981',
              gold: '#D4B26F',
              silver: '#F8FAFC'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>

  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Main Script -->
  <script src="main.js" defer></script>
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="bg-slate-50 dark:bg-brand-navy text-slate-800 dark:text-slate-100 min-h-screen flex items-stretch overflow-y-auto font-sans transition-colors duration-300">

  <!-- Main Centered Container -->
  <div class="w-full min-h-screen flex flex-col justify-center items-center p-6 pt-20 md:p-12 bg-slate-100 dark:bg-gradient-to-b dark:from-[#123824] dark:to-brand-navy relative transition-colors duration-300">
    <!-- Toolbar Controls -->
    <div class="absolute top-6 right-6 flex items-center space-x-3 rtl:space-x-reverse">
      <!-- Theme Toggle -->
      <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full border border-slate-300 dark:border-white/20 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-white/10 transition" aria-label="Toggle theme">
        <i class="fa-solid fa-sun sun-icon hidden text-brand-gold text-sm"></i>
        <i class="fa-solid fa-moon moon-icon text-slate-600 dark:text-slate-300 text-sm"></i>
      </button>
      <!-- RTL Toggle -->
      <button id="rtl-toggle" class="w-10 h-10 flex items-center justify-center text-xs font-bold rounded-full border border-slate-300 dark:border-white/20 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-white/10 transition" aria-label="Toggle text direction">
        RTL
      </button>
    </div>

      <!-- Login Glassmorphism Card -->
      <div class="w-full max-w-md bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl space-y-6">
        <div class="flex flex-col items-center text-center">
          <a href="index.html" class="flex items-center space-x-2 mb-4">
            <img src="logo.png" alt="Aegis Logo" class="h-10 w-auto rounded">
            <span class="text-2xl font-bold font-serif text-slate-950 dark:text-white tracking-wider">AEGIS</span>
          </a>
          <h1 class="text-xl font-bold font-serif text-slate-900 dark:text-white">Client Portal Login</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Enter your secure credentials below</p>
        </div>

        <form id="login-form" class="space-y-4">
          <!-- Email Input -->
          <div>
            <label class="block text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Secure Email</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-xs"><i class="fa-solid fa-envelope"></i></span>
              <input type="email" id="email" required placeholder="" class="w-full bg-slate-50 dark:bg-brand-navy/60 border border-slate-300 dark:border-white/10 text-slate-800 dark:text-white rounded px-10 py-2.5 text-sm focus:outline-none focus:border-brand-gold transition">
            </div>
            <span class="error-message text-[10px] text-red-500 block mt-1"></span>
          </div>

          <!-- Password Input -->
          <div>
            <label class="block text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Password</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-xs"><i class="fa-solid fa-lock"></i></span>
              <input type="password" id="password" required placeholder="" class="w-full bg-slate-50 dark:bg-brand-navy/60 border border-slate-300 dark:border-white/10 text-slate-800 dark:text-white rounded px-10 py-2.5 text-sm focus:outline-none focus:border-brand-gold transition">
              <button type="button" id="password-toggle" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 hover:text-brand-gold transition" aria-label="Toggle password visibility">
                <i class="fa-solid fa-eye" id="eye-icon"></i>
              </button>
            </div>
            <span class="error-message text-[10px] text-red-500 block mt-1"></span>
          </div>

          <!-- Actions: Remember Me & Forgot Password -->
          <div class="flex items-center justify-between text-xs text-slate-500 dark:text-slate-400 pt-1">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="checkbox" class="accent-brand-gold bg-brand-navy border-white/10 rounded">
              <span>Remember Me</span>
            </label>
            <a href="#" class="hover:text-brand-gold transition">Forgot Password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="w-full bg-brand-gold hover:bg-white text-brand-navy hover:text-brand-navy font-bold uppercase tracking-wider py-3 rounded transition-all shadow-md">
            Enter Portal
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center justify-between text-xs text-slate-500 my-4">
          <div class="w-full h-[1px] bg-slate-200 dark:bg-white/10"></div>
          <span class="px-3 uppercase tracking-wider text-[9px] shrink-0 text-slate-500 dark:text-slate-400">Or Secure Login With</span>
          <div class="w-full h-[1px] bg-slate-200 dark:bg-white/10"></div>
        </div>

        <!-- Social logins -->
        <div class="grid grid-cols-2 gap-4">
          <button class="flex items-center justify-center space-x-2 py-2.5 bg-slate-100 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded hover:bg-slate-200 dark:hover:bg-white/10 transition text-xs text-slate-800 dark:text-white">
            <i class="fa-brands fa-google text-red-500"></i> <span>Google</span>
          </button>
          <button class="flex items-center justify-center space-x-2 py-2.5 bg-slate-100 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded hover:bg-slate-200 dark:hover:bg-white/10 transition text-xs text-slate-800 dark:text-white">
            <i class="fa-brands fa-apple text-slate-900 dark:text-white"></i> <span>Apple</span>
          </button>
        </div>

        <!-- Call to Signup -->
        <div class="text-center text-xs text-slate-400 pt-4">
          Don't have a secure advisor account? <a href="signup.html" class="text-brand-gold hover:underline">Request Access</a>
        </div>
      </div>
  </div>

  <script>
    // Password visibility toggle
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('password-toggle');
    const eyeIcon = document.getElementById('eye-icon');

    if (passwordToggle && passwordInput && eyeIcon) {
      passwordToggle.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.classList.remove('fa-eye');
          eyeIcon.classList.add('fa-eye-slash');
        } else {
          passwordInput.type = 'password';
          eyeIcon.classList.remove('fa-eye-slash');
          eyeIcon.classList.add('fa-eye');
        }
      });
    }

    // Login validation
    const form = document.getElementById('login-form');
    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email');
        const password = document.getElementById('password');
        let isValid = true;

        if (!email.value.trim()) {
          isValid = false;
          email.classList.add('border-red-500');
        } else {
          email.classList.remove('border-red-500');
        }

        if (!password.value.trim()) {
          isValid = false;
          password.classList.add('border-red-500');
        } else {
          password.classList.remove('border-red-500');
        }

        if (isValid) {
          alert('Initializing secure MFA tokens. Redirecting to mock client transaction dashboard...');
          window.location.href = 'index.html';
        }
      });
    }
  </script>
</body>
</html>
